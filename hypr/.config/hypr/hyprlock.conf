general {
    disable_loading_bar = false
    grace               = 2
    hide_cursor         = true
    no_fade_in          = false
}

background {
    monitor     =
    path        = ~/.config/backgrounds/wallpaper-0.png
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.5
    color       = rgb(30, 30, 46)
}

label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color       = rgb(205, 214, 244)
    font_size   = 90
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 80
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:43200000] echo "$(date +"%A, %B %d")"
    color       = rgb(166, 173, 200)
    font_size   = 24
    font_family = JetBrainsMono Nerd Font
    position    = 0, 0
    halign      = center
    valign      = center
}

input-field {
    monitor           =
    size              = 300, 60
    outline_thickness = 3
    dots_size         = 0.26
    dots_spacing      = 0.64
    dots_center       = true
    outer_color       = rgb(203, 166, 247)
    inner_color       = rgb(30, 30, 46)
    font_color        = rgb(205, 214, 244)
    fade_on_empty     = true
    placeholder_text  = <i>Password...</i>
    hide_input        = false
    check_color       = rgb(166, 227, 161)
    fail_color        = rgb(243, 139, 168)
    fail_text         = <i>Incorrect ($ATTEMPTS)</i>
    capslock_color    = rgb(250, 179, 135)
    position          = 0, -200
    halign            = center
    valign            = center
}

image {
    monitor      =
    path         = ~/.face
    size         = 100
    rounding     = -1
    border_size  = 3
    border_color = rgb(203, 166, 247)
    position     = 0, 120
    halign       = center
    valign       = bottom
}
